<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Icon_Final (no bg and high qual).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Partners | A.B.I.R</title>
</head>
<body>
    <!-- CUSTOM CONTEXT MENU -->
    <div id="context-menu">

    <!-- Header -->
    <div class="context-header">
        <h3>A.B.I.R</h3>
        <p id="contextTime">00:00 • Portfolio v2.0</p>
    </div>

    <div class="context-divider"></div>

    <!-- Navigation -->
    <button class="context-item" data-action="home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </button>

    <button class="context-item" data-action="about">
        <i class="fa-solid fa-user"></i>
        <span>About Me</span>
    </button>

    <button class="context-item" data-action="projects">
        <i class="fa-solid fa-code"></i>
        <span>Projects</span>
    </button>

    <button class="context-item" data-action="contact">
        <i class="fa-solid fa-envelope"></i>
        <span>Contact</span>
    </button>

    <div class="context-divider"></div>

    <!-- Utilities -->
    <button class="context-item" id="themeBtn">
        <i class="fa-solid fa-moon"></i>
        <span>Toggle Theme</span>
    </button>

    <button class="context-item" id="musicBtn">
        <i class="fa-solid fa-music"></i>
        <span>Play Background Music</span>
    </button>

    <button class="context-item"
            onclick="window.open('https://github.com/MysTry-CTRL','_blank')">
        <i class="fa-brands fa-github"></i>
        <span>Visit GitHub</span>
    </button>

    <div class="context-divider"></div>

    <!-- Portfolio Actions -->
    <button class="context-item" data-action="copy">
        <i class="fa-solid fa-copy"></i>
        <span>Copy Portfolio Link</span>
    </button>

    <button class="context-item" data-action="top">
        <i class="fa-solid fa-arrow-up"></i>
        <span>Back to Top</span>
    </button>

    <button class="context-item" data-action="refresh">
        <i class="fa-solid fa-rotate-right"></i>
        <span>Refresh</span>
    </button>

</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
    <source src="assets/audio/background.mp3" type="audio/mpeg">
</audio>

<!-- HEADER SECTION -->
<header class="header">
        <div class="logo">
            <img src="Icon_Final (no bg and high qual).png" alt="Logo">
            <a href="index.html" class="logo-text-link"><span class="logo-text">A.B.I.R</span></a>
        </div>
        
        <nav class="topbar">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
            <button class="contact-button" onclick="window.location.href='contact.html'">Contact Me</button>
        </nav>
    </header>
<main class="section-container">
    <section class="partner-intro">
        <h2 class="section-heading">Our Partners</h2>

        <div class="partner-description">
            <p class="section-description">Check out our partners here:</p>
        </div>

        <div class="partner-list">
            <article>
                <div class="partner-icon">
                    <img src="YouTube_logo.png" alt="YouTube Logo">
                </div>

                <div class="partner-name">
                    MysTry (Abir Biswas)
                </div>
            </article>
        </div>
    </section>
</main>
    <!-- FOOTER SECTION -->
    <div class="footer">
        <div class="footer-logo">
            <img src="Icon_Final (no bg and high qual).png" alt="Logo"> 
            <span class="footer-logo-text">A.B.I.R | Beyond Ordinary</span>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="footer-right">
            <p>&copy; 2026 A.B.I.R | Beyond Ordinary. All rights reserved.</p>
        </div>
        <div class="footer-secret-links">
            <strong>Current Version: Release 6</strong>
            <a href="dashboard.html" target="_blank">Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
